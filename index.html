<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>跑步節拍器</title>

    <link rel="manifest" href="./manifest.json">
    <meta id="theme-color-meta" name="theme-color" content="#F7EDEF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3843/3843034.png">

    <style>
        /* ===== CSS 變數 / 主題 ===== */
        :root {
            --bg-page:     #F7EDEF;
            --c-mid:       #D6B2BC;
            --c-dark:      #B38C97;
            --c-light:     #EDD3D7;
            --c-text:      #8E6E77;
            --white:       #ffffff;
            --setting-bg:  #F7EDEF;
            --input-bg:    var(--setting-bg);
            --input-border:#EDD3D7;
        }
        [data-theme="purple"] {
            --bg-page: #FCF4FC; --c-mid: #D6B8D3; --c-dark: #A67B9F;
            --c-light: #F2D5F2; --c-text: #6a5a6b;
            --setting-bg: #FCF4FC; --input-bg: #FCF4FC; --input-border: #F2D5F2;
        }
        [data-theme="ocean"] {
            --bg-page: #E3F2FD; --c-mid: #90B4D9; --c-dark: #5F89B3;
            --c-light: #C1D5EB; --c-text: #455A64;
            --setting-bg: #ECF3F9; --input-bg: #E3F2FD; --input-border: #C1D5EB;
        }
        [data-theme="forest"] {
            --bg-page: #F1F8E9; --c-mid: #ACC490; --c-dark: #7D9462;
            --c-light: #DCEDC8; --c-text: #4F5D3D;
            --setting-bg: #F9FBF7; --input-bg: #F1F8E9; --input-border: #DCEDC8;
        }

        /* ===== Reset & 基礎 ===== */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        input[type="number"],
        input[type="text"],
        select {
            user-select: text;
            -webkit-user-select: text;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-page);
            transition: background-color 0.3s;
            color: var(--c-text);
            overflow: hidden;
            position: relative;
        }

        /* ===== Toast 共用 ===== */
        #offline-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #c0706a;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
            pointer-events: none;
            animation: fadeInUp 0.5s ease;
            white-space: nowrap;
        }

        /* ===== 更新 Toast ===== */
        #update-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--c-dark);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
            cursor: pointer;
            animation: fadeInUp 0.5s ease;
        }

        /* ===== 主題分頁標籤（框框右側垂直排列） ===== */
        .folder-tabs {
            position: absolute;
            top: 50%;
            left: calc(50% + 170px + 6px);
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .tab {
            width: 15px;
            height: 40px;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
            border: none;
            opacity: 0.5;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.05);
            transition: width 0.25s ease, opacity 0.2s;
        }
        .tab.active  { opacity: 1; width: 26px; }
        .tab-rose    { background-color: #D6B2BC; }
        .tab-purple  { background-color: #D6B8D3; }
        .tab-ocean   { background-color: #90B4D9; }
        .tab-forest  { background-color: #ACC490; }

        /* ===== 主容器 ===== */
        .container {
            background: var(--white);
            padding: 2.2rem 1.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            text-align: center;
            width: 340px;
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* ===== 跑步模式（全螢幕） ===== */
        .container.running {
            background: transparent;
            box-shadow: none;
            width: 100vw;
            height: 100vh;
            padding: 0;
            justify-content: space-evenly;
            border-radius: 0;
            margin-top: 0;
        }
        .running .folder-tabs,
        .running .bpm-controls-wrapper,
        .running .settings-grid,
        .running .switches-row {
            display: none !important;
        }

        /* ===== 計時器 ===== */
        .running-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            justify-content: center;
        }
        .running .running-content-wrapper { height: 90%; }

        .timer-section        { display: none; width: 100%; }
        .timer-section.active { display: block; }

        .timer-display {
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: var(--c-mid);
            font-variant-numeric: tabular-nums;
        }
        .container:not(.running) .timer-display {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        .running .timer-display {
            font-size: min(28vw, 22vh);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 2vh;
        }
        .digit { display: inline-block; text-align: center; width: 0.65em; }
        .sep   { display: inline-block; text-align: center; width: 0.25em; }

        /* ===== BPM 控制區 ===== */
        .bpm-controls-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 5px;
        }
        .bpm-text {
            font-size: 4.2rem;
            font-weight: 800;
            color: var(--c-mid);
            line-height: 0.8;
        }
        .unit-label {
            font-size: 0.8rem;
            color: var(--c-text);
            opacity: 0.5;
            font-weight: bold;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* ===== 呼吸圓圈 ===== */
        #breathCircle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.1);
            width: 90vh;
            height: 90vh;
            background-color: var(--c-mid);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            display: none;
        }

        /* ===== 按鈕 ===== */
        .btn-round {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: var(--white);
            color: var(--c-mid);
            border: 2px solid var(--c-light);
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-round:active { transform: scale(0.9); }

        .main-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
            align-items: center;
            width: 100%;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
        }
        .btn-base {
            padding: 18px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-start,
        .btn-pause,
        .btn-resume {
            background-color: var(--c-mid);
            color: var(--white);
            width: 100%;
            max-width: 280px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .btn-stop {
            background-color: transparent;
            color: var(--c-mid);
            border: 2px solid var(--c-light);
            width: 100px;
        }
        .running .btn-base    { padding: 22px 40px; font-size: 1.4rem; border-radius: 30px; }
        .running .btn-stop    { width: 130px; font-size: 1.2rem; background: rgba(255,255,255,0.2); color: var(--c-mid); border: 2px solid var(--c-light); }

        /* ===== 開關列 ===== */
        .switches-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 260px;
            margin-top: 4px;
            padding-bottom: 8px;
        }
        .toggle-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--c-mid);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .toggle-item input {
            cursor: pointer;
            width: 18px;
            height: 18px;
            appearance: none;
            -webkit-appearance: none;
            background-color: var(--white);
            border: 2px solid var(--c-light);
            border-radius: 4px;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .toggle-item input:checked { background-color: var(--bg-page); border-color: var(--c-mid); }
        .toggle-item input:checked::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--c-mid);
            font-size: 14px;
            font-weight: bold;
        }

        /* ===== 快速音量（跑步中） ===== */
        .quick-volume {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 280px;
            margin-top: 20px;
            background: none;
            border: none;
        }
        .running .quick-volume { display: flex; }

        .vol-icon-svg {
            width: 48px;
            height: 48px;
            cursor: pointer;
            fill: var(--c-mid);
            transition: fill 0.2s, transform 0.1s;
        }
        .vol-icon-svg:active { transform: scale(0.9); }
        .vol-muted { fill: var(--c-text); opacity: 0.4; }

        .vol-slider-row { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .vol-slider-row label {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--c-mid);
            display: flex;
            justify-content: space-between;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* ===== 設定面板 ===== */
        .settings-grid {
            display: grid;
            gap: 12px;
            margin-top: 0;
            text-align: left;
            background: var(--setting-bg);
            padding: 18px;
            border-radius: 30px;
            width: 100%;
            box-sizing: border-box;
        }
        .header-with-switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .label-text {
            font-size: 0.85rem;
            color: var(--c-mid);
            font-weight: 800;
        }
        .collapsible-settings {
            background: var(--white);
            border-radius: 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease-out;
            padding: 0 12px;
            opacity: 0;
        }
        .collapsible-settings.expanded {
            max-height: 400px;
            padding: 12px;
            opacity: 1;
            margin-top: 5px;
        }

        /* ===== Toggle 開關（滑塊式） ===== */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--c-light);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider              { background-color: var(--c-mid); }
        input:checked + .slider:before       { transform: translateX(18px); }

        /* ===== 輸出模式切換 ===== */
        .mode-switch {
            display: flex;
            background: var(--setting-bg);
            border-radius: 15px;
            padding: 4px;
            margin-bottom: 10px;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            font-size: 0.85rem;
            background: transparent;
            color: var(--c-text);
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .mode-btn.active { background: var(--c-mid); color: var(--white); }

        /* ===== 表單控件 ===== */
        select {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1.5px solid var(--input-border);
            font-size: 0.9rem;
            color: var(--c-text);
            background: var(--input-bg);
            cursor: pointer;
            margin-bottom: 10px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--c-mid);
            cursor: pointer;
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .input-group input {
            width: 80px;
            padding: 8px;
            border-radius: 12px;
            border: 1.5px solid var(--input-border);
            text-align: center;
            color: var(--c-mid);
            font-weight: bold;
            background: var(--input-bg);
        }

        /* ===== 呼吸輸入欄位 ===== */
        #breathInputsWrapper {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .breath-inputs-item { text-align: center; }
        .breath-inputs-item small {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 3px;
            opacity: 0.7;
        }
        .breath-inputs-item input {
            width: 100%;
            padding: 8px 2px;
            border-radius: 12px;
            border: 1.5px solid var(--input-border);
            text-align: center;
            color: var(--c-mid);
            font-weight: bold;
            background: var(--input-bg);
            box-sizing: border-box;
        }

        /* ===== 動畫 ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to   { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body onclick="initAudio()">

<div id="update-toast" onclick="location.reload(true)">發現新版本，點擊此處更新 ✨</div>
<div id="offline-toast">⚠️ 初次使用請連網，背景音樂無法播放</div>
<div id="breathCircle"></div>

<!-- 主題分頁 -->
<div class="folder-tabs" id="folderTabs">
    <div class="tab tab-rose"   id="tab-rose"   onclick="setTheme('rose')"></div>
    <div class="tab tab-purple" id="tab-purple" onclick="setTheme('purple')"></div>
    <div class="tab tab-ocean"  id="tab-ocean"  onclick="setTheme('ocean')"></div>
    <div class="tab tab-forest" id="tab-forest" onclick="setTheme('forest')"></div>
</div>

<!-- 主容器 -->
<div class="container" id="appContainer">

    <!-- 跑步中顯示的計時器 + 按鈕 -->
    <div class="running-content-wrapper">
        <div id="timerSection" class="timer-section">
            <div id="timerDisplay" class="timer-display">
                <span id="hGroup" style="display:none">
                    <span id="h1" class="digit">0</span><span id="h2" class="digit">0</span><span class="sep">:</span>
                </span>
                <span id="m1" class="digit">0</span><span id="m2" class="digit">0</span><span class="sep">:</span>
                <span id="s1" class="digit">0</span><span id="s2" class="digit">0</span>
            </div>
        </div>

        <!-- BPM 控制 -->
        <div class="bpm-controls-wrapper">
            <button class="btn-round" onclick="adjustBPM(-10)">−</button>
            <div style="display:flex; flex-direction:column; align-items:center;">
                <span class="bpm-text" id="bpmValue">180</span>
                <span class="unit-label">BPM</span>
            </div>
            <button class="btn-round" onclick="adjustBPM(10)">+</button>
        </div>

        <!-- 主要按鈕 + 開關 -->
        <div id="mainControls" class="main-controls">
            <div class="btn-row" id="initialBtnRow">
                <button class="btn-start btn-base" onclick="startRunning()">開始跑步</button>
            </div>

            <div class="switches-row">
                <label class="toggle-item">
                    <input type="checkbox" id="wakeLockToggle" onchange="saveSettings()">
                    <span>螢幕常亮</span>
                </label>
                <label class="toggle-item">
                    <input type="checkbox" id="musicToggle" onchange="saveSettings()">
                    <span>背景音樂</span>
                </label>
            </div>

            <!-- 跑步中快速音量 -->
            <div class="quick-volume" id="quickVolGroup">
                <div id="volIconWrapper"
                     onclick="handleVolClick(event)"
                     ondblclick="handleVolDblClick(event)"></div>
                <div id="quickVolSlider" style="display:none; width:100%; flex-direction:column; gap:15px; margin-top:10px;">
                    <div class="vol-slider-row">
                        <label>節拍器音量 <span id="qMetVolLab">50</span>%</label>
                        <input type="range" id="volMetFocus" min="0" max="100" value="50"
                               oninput="updateMetVol(this.value)">
                    </div>
                    <div class="vol-slider-row">
                        <label>音樂音量 <span id="qMusVolLab">50</span>%</label>
                        <input type="range" id="volMusFocus" min="0" max="100" value="50"
                               oninput="updateMusVol(this.value)">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定面板 -->
    <div class="settings-grid" id="settingsGrid">

        <!-- 停止時間 -->
        <div>
            <div class="header-with-switch">
                <span class="label-text">⏱ 停止時間</span>
                <label class="switch">
                    <input type="checkbox" id="countdownToggle" onchange="toggleCountdown()">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="collapsible-settings" id="countdownContainer">
                <div class="input-group">
                    <input type="number" id="countdownMinutes" value="30" min="1" onchange="saveSettings()">
                    <span class="label-text" style="color:var(--c-text); opacity:0.6;">分鐘後自動停止</span>
                </div>
            </div>
        </div>

        <!-- 呼吸引導 -->
        <div>
            <div class="header-with-switch">
                <span class="label-text">🌬 呼吸引導</span>
                <label class="switch">
                    <input type="checkbox" id="breathToggle" onchange="toggleBreath()">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="collapsible-settings" id="breathContainer">
                <div id="breathInputsWrapper">
                    <div class="breath-inputs-item">
                        <small>吸氣(s)</small>
                        <input type="number" id="inhaleTime" value="4" min="1" onchange="saveSettings()">
                    </div>
                    <div class="breath-inputs-item">
                        <small>保持(s)</small>
                        <input type="number" id="holdTime" value="2" min="0" onchange="saveSettings()">
                    </div>
                    <div class="breath-inputs-item">
                        <small>吐氣(s)</small>
                        <input type="number" id="exhaleTime" value="6" min="1" onchange="saveSettings()">
                    </div>
                </div>
            </div>
        </div>

        <!-- 聲音設置 -->
        <div>
            <div class="header-with-switch">
                <span class="label-text">🔊 聲音設置</span>
                <label class="switch">
                    <input type="checkbox" id="soundSettingToggle" onchange="toggleSoundSetting()">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="collapsible-settings" id="soundSettingContainer">
                <div class="sub-setting-item">
                    <div class="label-text" style="margin-bottom:5px; opacity:0.7;">🎧 輸出模式</div>
                    <div class="mode-switch">
                        <button class="mode-btn" id="modeEarphone" onclick="setMode('earphone')">耳機</button>
                        <button class="mode-btn" id="modeSpeaker"  onclick="setMode('speaker')">喇叭</button>
                    </div>
                </div>
                <div class="sub-setting-item">
                    <div class="label-text" style="margin-bottom:5px; opacity:0.7;">🎵 選擇音色</div>
                    <select id="soundType" onchange="handleSoundChange(this)">
                        <option value="electronic">電子點擊 (經典)</option>
                        <option value="woodblock" selected>圓潤木魚 (推薦)</option>
                        <option value="kick">深沉大鼓 (低音)</option>
                        <option value="bell">清脆銅鈴 (高音)</option>
                        <option value="beep">數位嗶聲 (計時器)</option>
                        <option value="water">柔和水滴 (安靜)</option>
                    </select>
                </div>
                <div class="sub-setting-item" style="margin-top:10px;">
                    <div class="label-text" style="margin-bottom:5px; opacity:0.7;">
                        🔈 節拍音量: <span id="volMetLabel">50</span>%
                    </div>
                    <input type="range" id="volMetMain" min="0" max="100" value="50"
                           oninput="updateMetVol(this.value)">
                </div>
                <div class="sub-setting-item" style="margin-top:10px;">
                    <div class="label-text" style="margin-bottom:5px; opacity:0.7;">
                        🎵 音樂音量: <span id="volMusLabel">50</span>%
                    </div>
                    <input type="range" id="volMusMain" min="0" max="100" value="50"
                           oninput="updateMusVol(this.value)">
                </div>
            </div>
        </div>

    </div><!-- /settings-grid -->
</div><!-- /container -->

<script>
    /* =====================================================================
     * 常數 & 設定
     * ===================================================================== */
    const APP_VERSION = "2026.01.4";

    const THEME_COLORS = {
        rose:   '#F7EDEF',
        purple: '#FCF4FC',
        ocean:  '#E3F2FD',
        forest: '#F1F8E9',
    };

    const SOUND_PARAMS = {
        woodblock:  { freq: 880,  type: 'triangle', decay: 0.06  },
        kick:       { freq: 120,  type: 'sine',     decay: 0.15  },
        bell:       { freq: 2800, type: 'sine',     decay: 0.1   },
        beep:       { freq: 1000, type: 'square',   decay: 0.04  },
        water:      { freq: 1600, type: 'sine',     decay: 0.03  },
        electronic: { freq: 1200, type: 'sine',     decay: 0.04  },
    };

    const MUSIC_SRC = 'https://res.cloudinary.com/dvbwcjpdu/video/upload/v1767812963/music_1_xih1u2.mp3';

    const SVG_SPEAKER = `<svg class="vol-icon-svg" viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>`;
    const SVG_MUTE    = `<svg class="vol-icon-svg vol-muted" viewBox="0 0 24 24"><path d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.45 16.63,19.82 17.68,18.96L19.73,21L21,19.73L12,10.73M19,12C19,12.94 18.8,13.82 18.46,14.64L19.97,16.15C20.62,14.91 21,13.5 21,12C21,7.72 18.03,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,10.23 15.5,8.71 14,7.97V10.18L16.45,12.63C16.48,12.43 16.5,12.22 16.5,12Z"/></svg>`;

    /* =====================================================================
     * 狀態變數
     * ===================================================================== */
    let audioCtx      = null;
    let timerID       = null;
    let clockInterval = null;
    let isRunning     = false;
    let isPaused      = false;
    let isMuted       = false;
    let secondsElapsed = 0;
    let nextTickTime  = 0;
    let clickTimer    = null;
    let debounceTimer = null;
    let wakeLock      = null;

    // 從 localStorage 讀取設定（含預設值）
    let bpm              = parseInt(localStorage.getItem('runningBpm'))     || 180;
    let volMet           = parseInt(localStorage.getItem('volMet'))         || 50;
    let volMus           = parseInt(localStorage.getItem('volMus'))         || 50;
    let soundType        = localStorage.getItem('runningSound')             || 'woodblock';
    let outputMode       = localStorage.getItem('runningMode')              || 'earphone';
    let currentTheme     = localStorage.getItem('runningTheme')             || 'rose';
    let breathActive     = localStorage.getItem('breathActive')             === 'true';
    let countdownActive  = localStorage.getItem('countdownActive')          === 'true';
    let soundSettingActive = localStorage.getItem('soundSettingActive')     === 'true';
    let wakeLockEnabled  = localStorage.getItem('wakeLockEnabled')          !== 'false';
    let musicEnabled     = localStorage.getItem('musicEnabled')             === 'true';

    // 背景音樂
    const bgMusic = new Audio();
    bgMusic.crossOrigin = "anonymous";
    bgMusic.src     = MUSIC_SRC;
    bgMusic.loop    = true;
    bgMusic.preload = "auto";

    // 偵測首次載入時無網路（音樂抓取失敗）
    let musicLoadFailed = false;
    bgMusic.addEventListener('error', () => {
        if (!musicLoadFailed) {
            musicLoadFailed = true;
            showOfflineToast();
        }
    });

    /* =====================================================================
     * 初始化
     * ===================================================================== */
    window.onload = function () {
        checkVersion();

        // 套用儲存的數值到 UI
        document.getElementById('bpmValue').textContent        = bpm;
        document.getElementById('soundType').value            = soundType;

        document.getElementById('volMetMain').value           = volMet;
        document.getElementById('volMetFocus').value          = volMet;
        document.getElementById('volMetLabel').textContent    = volMet;
        document.getElementById('qMetVolLab').textContent     = volMet;

        document.getElementById('volMusMain').value           = volMus;
        document.getElementById('volMusFocus').value          = volMus;
        document.getElementById('volMusLabel').textContent    = volMus;
        document.getElementById('qMusVolLab').textContent     = volMus;

        document.getElementById('breathToggle').checked       = breathActive;
        document.getElementById('inhaleTime').value           = localStorage.getItem('inhaleTime') || 4;
        document.getElementById('holdTime').value             = localStorage.getItem('holdTime')   || 2;
        document.getElementById('exhaleTime').value           = localStorage.getItem('exhaleTime') || 6;
        if (breathActive) document.getElementById('breathContainer').classList.add('expanded');

        document.getElementById('countdownToggle').checked    = countdownActive;
        document.getElementById('countdownMinutes').value     = localStorage.getItem('countdownMinutes') || 30;
        if (countdownActive) document.getElementById('countdownContainer').classList.add('expanded');

        document.getElementById('soundSettingToggle').checked = soundSettingActive;
        if (soundSettingActive) document.getElementById('soundSettingContainer').classList.add('expanded');

        document.getElementById('wakeLockToggle').checked     = wakeLockEnabled;
        document.getElementById('musicToggle').checked        = musicEnabled;

        setTheme(currentTheme);
        updateModeUI();
        renderVolIcon();
        updateMusicVolume();
    };

    /* =====================================================================
     * Service Worker & 版本更新
     * ===================================================================== */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => {
                    reg.update();
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateToast();
                            }
                        });
                    });
                })
                .catch(err => console.log('SW fail', err));
        });
    }

    function checkVersion() {
        const savedVersion = localStorage.getItem('app_version');
        if (savedVersion && savedVersion !== APP_VERSION) showUpdateToast();
        localStorage.setItem('app_version', APP_VERSION);
    }

    function showUpdateToast() {
        document.getElementById('update-toast').style.display = 'block';
    }

    function showOfflineToast() {
        const toast = document.getElementById('offline-toast');
        toast.style.display = 'block';
        // 5 秒後自動淡出
        setTimeout(() => {
            toast.style.transition = 'opacity 0.8s';
            toast.style.opacity = '0';
            setTimeout(() => { toast.style.display = 'none'; toast.style.opacity = '1'; toast.style.transition = ''; }, 800);
        }, 5000);
    }

    /* =====================================================================
     * 主題
     * ===================================================================== */
    function setTheme(theme) {
        currentTheme = theme;
        document.body.setAttribute('data-theme', theme);

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const activeTab = document.getElementById('tab-' + theme);
        if (activeTab) activeTab.classList.add('active');

        const targetColor = THEME_COLORS[theme] || THEME_COLORS.rose;

        let meta = document.getElementById('theme-color-meta')
                   || document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', targetColor);

        let iosMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (iosMeta) iosMeta.setAttribute('content', 'default');

        saveSettings();
    }

    /* =====================================================================
     * 音訊
     * ===================================================================== */
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playClick(time, isEndSound = false) {
        if (!audioCtx || isMuted) return;

        const modeMultiplier = outputMode === 'speaker' ? 1.0 : 0.15;
        const gainValue = (volMet / 100) * modeMultiplier;

        let freq, type, decay;
        if (isEndSound) {
            freq = 660; type = 'sine'; decay = 0.3;
        } else {
            ({ freq, type, decay } = SOUND_PARAMS[soundType] || SOUND_PARAMS.woodblock);
        }

        const osc      = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        envelope.gain.setValueAtTime(0, time);
        envelope.gain.linearRampToValueAtTime(gainValue, time + 0.002);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + decay);

        osc.connect(envelope);
        envelope.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + decay + 0.1);
    }

    function updateMusicVolume() {
        const modeMultiplier = outputMode === 'speaker' ? 0.8 : 0.4;
        bgMusic.volume = (volMus / 100) * modeMultiplier;
        bgMusic.muted  = isMuted;
    }

    /* =====================================================================
     * 跑步控制
     * ===================================================================== */
    function startRunning() {
        initAudio();
        requestWakeLock();
        audioCtx.resume().then(() => {
            isRunning      = true;
            isPaused       = false;
            secondsElapsed = 0;
            nextTickTime   = audioCtx.currentTime + 0.05;

            refreshTimerUI();
            document.getElementById('timerSection').classList.add('active');
            document.getElementById('appContainer').classList.add('running');
            document.getElementById('folderTabs').style.display = 'none';

            if (breathActive) startBreathAnimation();
            if (musicEnabled) {
                updateMusicVolume();
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e => console.error(e));
            }

            scheduler();
            if (clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(updateClock, 1000);
            updateButtonUI();
        });
    }

    function stopRunning() {
        isRunning = false;
        isPaused  = false;
        releaseWakeLock();
        clearTimeout(timerID);
        if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
        secondsElapsed = 0;

        document.getElementById('appContainer').classList.remove('running');
        document.getElementById('timerSection').classList.remove('active');
        document.getElementById('quickVolSlider').style.display = 'none';
        document.getElementById('folderTabs').style.display = 'flex';

        stopBreathAnimation();
        updateButtonUI();
        bgMusic.pause();
        bgMusic.currentTime = 0;
    }

    function pauseRunning() {
        isPaused = true;
        releaseWakeLock();
        clearTimeout(timerID);
        stopBreathAnimation();
        updateButtonUI();
        bgMusic.pause();
    }

    function resumeRunning() {
        isPaused     = false;
        nextTickTime = audioCtx.currentTime;
        initAudio();
        requestWakeLock();
        if (breathActive) startBreathAnimation();
        if (musicEnabled) bgMusic.play();
        scheduler();
        updateButtonUI();
    }

    function scheduler() {
        if (!isRunning || isPaused) return;
        while (nextTickTime < audioCtx.currentTime + 0.1) {
            playClick(nextTickTime);
            nextTickTime += 60.0 / bpm;
        }
        timerID = setTimeout(scheduler, 25);
    }

    /* =====================================================================
     * 計時器
     * ===================================================================== */
    function updateClock() {
        if (!isRunning || isPaused) return;
        secondsElapsed++;
        refreshTimerUI();

        if (countdownActive) {
            const targetSeconds = parseInt(document.getElementById('countdownMinutes').value) * 60;
            if (secondsElapsed >= targetSeconds) {
                const now = audioCtx.currentTime;
                playClick(now, true);
                playClick(now + 0.3, true);
                setTimeout(stopRunning, 1000);
            }
        }
    }

    function refreshTimerUI() {
        const hrs  = Math.floor(secondsElapsed / 3600);
        const mins = Math.floor((secondsElapsed % 3600) / 60);
        const secs = secondsElapsed % 60;

        const hGroup = document.getElementById('hGroup');
        const tDisp  = document.getElementById('timerDisplay');

        if (hrs > 0) {
            hGroup.style.display = 'inline-block';
            tDisp.classList.add('long-time');
            document.getElementById('h1').textContent = Math.floor(hrs / 10);
            document.getElementById('h2').textContent = hrs % 10;
        } else {
            hGroup.style.display = 'none';
            tDisp.classList.remove('long-time');
        }

        document.getElementById('m1').textContent = Math.floor(mins / 10);
        document.getElementById('m2').textContent = mins % 10;
        document.getElementById('s1').textContent = Math.floor(secs / 10);
        document.getElementById('s2').textContent = secs % 10;
    }

    function updateButtonUI() {
        const row = document.getElementById('initialBtnRow');
        if (!isRunning) {
            row.innerHTML = `<button class="btn-base btn-start" onclick="startRunning()">開始跑步</button>`;
        } else if (isPaused) {
            row.innerHTML = `
                <button class="btn-base btn-resume" onclick="resumeRunning()">繼續</button>
                <button class="btn-base btn-stop"   onclick="stopRunning()">停止</button>`;
        } else {
            row.innerHTML = `
                <button class="btn-base btn-pause" onclick="pauseRunning()">暫停</button>
                <button class="btn-base btn-stop"  onclick="stopRunning()">停止</button>`;
        }
    }

    /* =====================================================================
     * BPM
     * ===================================================================== */
    function adjustBPM(amount) {
        bpm = Math.max(100, Math.min(500, bpm + amount));
        document.getElementById('bpmValue').textContent = bpm;
        saveSettings();
    }

    /* =====================================================================
     * 呼吸動畫
     * ===================================================================== */
    function startBreathAnimation() {
        const circle = document.getElementById('breathCircle');
        circle.style.display = 'block';

        const inT   = parseFloat(document.getElementById('inhaleTime').value) || 4;
        const hT    = parseFloat(document.getElementById('holdTime').value)   || 2;
        const exT   = parseFloat(document.getElementById('exhaleTime').value) || 6;
        const totalT = inT + hT + exT;

        circle.animate([
            { transform: 'translate(-50%,-50%) scale(0.1)', offset: 0 },
            { transform: 'translate(-50%,-50%) scale(1)',   offset: inT / totalT },
            { transform: 'translate(-50%,-50%) scale(1)',   offset: (inT + hT) / totalT },
            { transform: 'translate(-50%,-50%) scale(0.1)', offset: 1 },
        ], { duration: totalT * 1000, iterations: Infinity, easing: 'linear' });
    }

    function stopBreathAnimation() {
        const circle = document.getElementById('breathCircle');
        circle.getAnimations().forEach(anim => anim.cancel());
        circle.style.display = 'none';
    }

    /* =====================================================================
     * 設定開關（可折疊區塊）
     * ===================================================================== */
    function toggleBreath() {
        breathActive = document.getElementById('breathToggle').checked;
        document.getElementById('breathContainer').classList.toggle('expanded', breathActive);
        saveSettings();
        if (isRunning && breathActive && !isPaused) startBreathAnimation();
        else stopBreathAnimation();
    }

    function toggleCountdown() {
        countdownActive = document.getElementById('countdownToggle').checked;
        document.getElementById('countdownContainer').classList.toggle('expanded', countdownActive);
        saveSettings();
    }

    function toggleSoundSetting() {
        soundSettingActive = document.getElementById('soundSettingToggle').checked;
        document.getElementById('soundSettingContainer').classList.toggle('expanded', soundSettingActive);
        saveSettings();
    }

    /* =====================================================================
     * 音量 & 音色
     * ===================================================================== */
    function updateMetVol(val) {
        volMet = val;
        document.getElementById('volMetMain').value       = val;
        document.getElementById('volMetFocus').value      = val;
        document.getElementById('volMetLabel').textContent = val;
        document.getElementById('qMetVolLab').textContent  = val;

        initAudio();
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            if (!isRunning || isPaused) {
                const originalMute = isMuted;
                isMuted = false;
                playClick(audioCtx.currentTime);
                isMuted = originalMute;
            }
        }, 50);
        saveSettings();
    }

    function updateMusVol(val) {
        volMus = val;
        document.getElementById('volMusMain').value       = val;
        document.getElementById('volMusFocus').value      = val;
        document.getElementById('volMusLabel').textContent = val;
        document.getElementById('qMusVolLab').textContent  = val;

        updateMusicVolume();

        if (musicEnabled && !isRunning) {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (bgMusic.paused) {
                    bgMusic.play()
                        .then(() => setTimeout(() => { if (!isRunning) bgMusic.pause(); }, 1500))
                        .catch(e => console.log("Music preview blocked"));
                }
            }, 100);
        }
        saveSettings();
    }

    function handleSoundChange(el) {
        soundType = el.value;
        saveSettings();
        initAudio();
        if (audioCtx) playClick(audioCtx.currentTime);
    }

    function setMode(mode) {
        outputMode = mode;
        updateModeUI();
        updateMusicVolume();
        saveSettings();
        initAudio();
        if (audioCtx) playClick(audioCtx.currentTime);
    }

    function updateModeUI() {
        const earphoneBtn = document.getElementById('modeEarphone');
        const speakerBtn  = document.getElementById('modeSpeaker');
        if (earphoneBtn) earphoneBtn.classList.toggle('active', outputMode === 'earphone');
        if (speakerBtn)  speakerBtn.classList.toggle('active',  outputMode === 'speaker');
    }

    /* =====================================================================
     * 音量圖示（單擊靜音、雙擊顯示滑桿）
     * ===================================================================== */
    function renderVolIcon() {
        document.getElementById('volIconWrapper').innerHTML = isMuted ? SVG_MUTE : SVG_SPEAKER;
    }

    function handleVolClick(e) {
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
        clickTimer = setTimeout(() => {
            isMuted = !isMuted;
            renderVolIcon();
            updateMusicVolume();
            clickTimer = null;
        }, 250);
    }

    function handleVolDblClick(e) {
        clearTimeout(clickTimer);
        clickTimer = null;
        const slider = document.getElementById('quickVolSlider');
        slider.style.display = (slider.style.display === 'flex') ? 'none' : 'flex';
    }

    /* =====================================================================
     * Wake Lock
     * ===================================================================== */
    async function requestWakeLock() {
        if (!wakeLockEnabled) return;
        try {
            if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {}
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    /* =====================================================================
     * 儲存設定
     * ===================================================================== */
    function saveSettings() {
        wakeLockEnabled = document.getElementById('wakeLockToggle').checked;
        musicEnabled    = document.getElementById('musicToggle').checked;

        const settings = {
            runningBpm:        bpm,
            volMet:            volMet,
            volMus:            volMus,
            runningSound:      soundType,
            runningMode:       outputMode,
            breathActive:      breathActive,
            runningTheme:      currentTheme,
            countdownActive:   countdownActive,
            soundSettingActive:soundSettingActive,
            wakeLockEnabled:   wakeLockEnabled,
            musicEnabled:      musicEnabled,
            countdownMinutes:  document.getElementById('countdownMinutes').value,
            inhaleTime:        document.getElementById('inhaleTime').value,
            holdTime:          document.getElementById('holdTime').value,
            exhaleTime:        document.getElementById('exhaleTime').value,
        };

        Object.entries(settings).forEach(([k, v]) => localStorage.setItem(k, v));
    }
</script>
</body>
</html>
